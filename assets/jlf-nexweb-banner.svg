    <text x="800" y="257" text-anchor="middle" fill="#9FEFFF" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="600" letter-spacing="5">AI-OPTIMIZED DIGITAL PRESENCE</text>
